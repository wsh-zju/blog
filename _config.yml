# 站点设置
title: Lucy Wisteria's Blog
subtitle: 'Computer Sciences & Engineering'
description: '记录算法、架构与工程实践的个人知识库'
author: Lucy Wisteria
language: zh-CN
timezone: 'Asia/Shanghai'
theme: icarus

url: https://wsh-zju.github.io/blog/
root: /blog/
permalink: :year/:month/:day/:title/ # 这种结构最利于 SEO

index_generator:
  path: ''
  per_page: 10 # 首页文章数
  order_by: -date # 按时间倒序

# Deployment
deploy:
  type: git
  repo: https://github.com/wsh-zju/blog.git
  branch: gh-pages

fonts:
  family:
    # serif: 衬线体用于特定强调，保持经典
    serif: "Noto Serif SC, Georgia, serif"
    # sans-serif: 现代无衬线体，Inter 是目前的 UI 设计标准
    sans-serif: "Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif"
    # monospace: 编程字体王者 JetBrains Mono，阅读代码极度舒适
    monospace: "'JetBrains Mono', 'Fira Code', 'Source Code Pro', monospace"
comment:
  type: true